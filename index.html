<!-- Главная: Профиль -->
<div class="main-header">
    <div class="user-profile">
        <div class="user-avatar" id="user-photo"></div>
        <div class="user-text">
            <span id="user-name">Yuklanmoqda...</span>
        </div>
    </div>
    <!-- Справа можно добавить счетчик бонусов/монет, как на скрине -->
    <div class="user-bonus-badge">
        <i class="fas fa-coins"></i> <span id="user-bonus-val">0</span>
    </div>
</div>

<!-- Настройки: Личная карточка -->
<div id="settings-page" class="page hidden">
    <div class="settings-user-card">
        <div class="s-user-header">
            <div class="user-avatar-large" id="settings-photo"></div>
            <div class="s-user-info">
                <h2 id="settings-name">User Name</h2>
                <p id="settings-id">ID: 00000000</p>
            </div>
        </div>
        
        <div class="lang-selector-capsule">
            <button class="l-btn active" onclick="setLang('uz')">O'zbekcha</button>
            <button class="l-btn" onclick="setLang('ru')">Русский</button>
        </div>
    </div>

    <!-- Список настроек -->
    <div class="settings-list">
        <div class="s-item">
            <div class="s-item-left"><i class="fas fa-moon"></i> <span>Tungi rejim</span></div>
            <label class="switch"><input type="checkbox" checked onchange="toggleTheme()"><span class="slider"></span></label>
        </div>
        <div class="s-item">
            <div class="s-item-left"><i class="fas fa-bolt"></i> <span>Animatsiyalar</span></div>
            <label class="switch"><input type="checkbox" checked onchange="toggleAnims()"><span class="slider"></span></label>
        </div>
        <div class="s-item" onclick="window.open('https://t.me/FikoYT')">
            <div class="s-item-left"><i class="fas fa-headset"></i> <span>Qo'llab-quvvatlash</span></div>
            <i class="fas fa-chevron-right s-arrow"></i>
        </div>
    </div>
</div>
