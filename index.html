<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #1c2127; --accent: #5d5aff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 12px; }
        
        .balance-card {
            background: linear-gradient(135deg, #5d5aff, #8b5aff);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(93, 90, 255, 0.3);
        }
        .bal-val { font-size: 28px; font-weight: 700; margin: 8px 0; }
        .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .btn-sm { background: rgba(255,255,255,0.2); border: none; border-radius: 12px; padding: 10px; color: #fff; font-size: 10px; font-weight: 600; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 12px; background: var(--card); font-size: 14px; font-weight: 600; border: 1px solid transparent; }
        .tab.active { background: #252a32; border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 100px; }
        .game-card { background: var(--card); border-radius: 18px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .game-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-info { padding: 10px; text-align: center; }
        .game-name { font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--accent); font-size: 9px; padding: 3px 7px; border-radius: 6px; font-weight: 700; }

        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #181a20; border-radius: 20px; display: flex; justify-content: space-around; padding: 15px; border: 1px solid #2b2f36; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-i { font-size: 10px; opacity: 0.5; text-align: center; list-style: none; }
        .nav-i.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>
    <div class="balance-card">
        <div style="font-size: 12px; opacity: 0.8;">Balans</div>
        <div class="bal-val" id="user-balance">0 so'm</div>
        <div class="actions">
            <button class="btn-sm" onclick="sendToBot('deposit')">💳 To'ldirish</button>
            <button class="btn-sm">🎁 Bonuslar</button>
            <button class="btn-sm">💬 Yordam</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active">O'yinlar</div>
        <div class="tab">Promokodlar</div>
    </div>

    <div class="grid" id="game-grid">
        <div class="game-card" onclick="sendToBot('buy_pubg')">
            <div class="badge">Global</div>
            <img src="https://e7.pngegg.com/pngimages/514/1004/png-clipart-pubg-mobile-logo-pubg-logo.png" class="game-img">
            <div class="game-info"><div class="game-name">PUBG MOBILE</div></div>
        </div>
        <div class="game-card" onclick="sendToBot('buy_ff')">
            <div class="badge">SNG</div>
            <img src="https://static.wikia.nocookie.net/free-fire/images/e/e7/App_Icon.png" class="game-img">
            <div class="game-info"><div class="game-name">FREE FIRE</div></div>
        </div>
        <div class="game-card" onclick="sendToBot('buy_mlbb')">
            <div class="badge">Global</div>
            <img src="https://img.utdstc.com/icon/478/223/4782236371a53381665a5874f64795b2298751543ed963f237894a974b787595:200" class="game-img">
            <div class="game-info"><div class="game-name">MLBB</div></div>
        </div>
        <div class="game-card" onclick="sendToBot('buy_arena')">
            <div class="badge">AVTO</div>
            <img src="https://play-lh.googleusercontent.com/I9E0Yp0S6NqH6j0a1k9A" class="game-img">
            <div class="game-info"><div class="game-name">ARENA BREAKOUT</div></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-i active">🏠 Sahifa</div>
        <div class="nav-i">📜 Tarix</div>
        <div class="nav-i">⚙️ Sozlamalar</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendToBot(action) {
            tg.sendData(JSON.stringify({action: action}));
        }
    </script>
</body>
</html>
