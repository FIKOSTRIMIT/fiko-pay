<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiko Shop</title>
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="style.css">
    <!-- Иконки и Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <div class="user-info">
            <div class="avatar"></div>
            <span class="username" id="user-name">@user</span>
        </div>
        <div class="coins">
            <i class="fas fa-circle coin-icon"></i> <span id="user-coins">0</span>
        </div>
    </div>

    <div class="balance-card">
        <div class="bal-title">Balans</div>
        <div class="bal-value">0 <small style="font-size: 14px;">so'm</small></div>
        <div class="bal-actions">
            <button class="bal-btn" onclick="sendAction('deposit')">
                <i class="fas fa-wallet"></i> <span>Hisobni to'ldirish</span>
            </button>
            <button class="bal-btn">
                <i class="fas fa-th-large"></i> <span>Bonus kodlar</span>
            </button>
            <button class="bal-btn">
                <i class="fas fa-headset"></i> <span>Qo'llab-quvvatlash</span>
            </button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active">O'yinlar</div>
        <div class="tab inactive">Promokodlar</div>
    </div>

    <div class="games-grid" id="games-container">
        <!-- Сетка игр (заполнится через JS) -->
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i> <span>Bosh sahifa</span></div>
        <div class="nav-item"><i class="fas fa-history"></i> <span>Tarix</span></div>
        <div class="nav-item"><i class="fas fa-user-cog"></i> <span>Sozlamalar</span></div>
    </div>

    <!-- Подключаем скрипты в самом конце -->
    <script src="script.js"></script>
</body>
</html>
