<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fiko Shop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Скрипты для иконок и Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body>

    <!-- ГЛАВНАЯ СТРАНИЦА -->
    <div id="main-page">
        <div class="top-bar">
            <div class="user-info">
                <div class="avatar"></div>
                <span class="username" id="user-name">@username</span>
            </div>
            <div class="coins">
                <i class="fas fa-circle coin-icon"></i> <span>11</span>
            </div>
        </div>

        <div class="balance-card">
            <div class="bal-title">Баланс</div>
            <div class="bal-value">0 <small>сум</small></div>
            <div class="bal-actions">
                <button class="bal-btn"><i class="fas fa-wallet"></i> <span>Пополнить</span></button>
                <button class="bal-btn"><i class="fas fa-percent"></i> <span>Промокод</span></button>
                <button class="bal-btn"><i class="fas fa-headset"></i> <span>Помощь</span></button>
            </div>
        </div>

        <!-- Сетка 3x3 -->
        <div class="games-grid" id="games-container"></div>
    </div>

    <!-- СТРАНИЦА ТОВАРА -->
    <div id="item-page" style="display: none;">
        <div class="back-header">
            <div class="back-btn" onclick="showMainPage()">
                <i class="fas fa-arrow-left"></i> Назад
            </div>
        </div>

        <!-- Маленькая иконка и название в одну строку -->
        <div class="product-header">
            <img id="product-img" src="" alt="">
            <div class="product-text">
                <h2 id="product-title"></h2>
                <p id="product-subtitle">Игровой сервис</p>
            </div>
        </div>

        <div id="id-section" class="section-box"></div>

        <div class="category-selection-section">
            <span class="section-title">ВЫБЕРИТЕ ТОВАР</span>
            <div id="bg-text" class="bg-watermark">GAME</div> 
            <div class="category-tabs" id="category-tabs"></div>
        </div>

        <div class="prices-grid" id="prices-container"></div>

        <div class="action-footer">
            <button class="buy-btn-fixed">Купить сейчас</button>
        </div>
    </div>

    <!-- Нижнее меню -->
    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i> <span>Главная</span></div>
        <div class="nav-item"><i class="fas fa-shopping-bag"></i> <span>Заказы</span></div>
        <div class="nav-item"><i class="fas fa-user"></i> <span>Профиль</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
